<svg xmlns="http://www.w3.org/2000/svg" width="480" height="140" viewBox="0 0 480 140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;display=swap');
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="480" height="140" rx="16" fill="#111111"/>

  <!-- Amber ring -->
  <circle cx="72" cy="70" r="36" fill="none" stroke="#EF9F27" stroke-width="2" opacity="0.4"/>

  <!-- Play button -->
  <circle cx="72" cy="70" r="28" fill="#EF9F27"/>
  <polygon points="63,57 87,70 63,83" fill="#111111"/>

  <!-- Tagline -->
  <text x="124" y="54" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="500" fill="#EF9F27" letter-spacing="2.5" opacity="0.85">YOUTUBE → TEXT</text>

  <!-- Wordmark -->
  <text x="122" y="97" font-family="'Space Grotesk', sans-serif" font-size="40" font-weight="700" fill="white">Transcript<tspan fill="#EF9F27">AI</tspan></text>
</svg>
